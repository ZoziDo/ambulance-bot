name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dump Database with PostgreSQL 18
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            --env PGPASSWORD=$(echo $DATABASE_URL | sed 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/') \
            postgres:18 \
            pg_dump "$DATABASE_URL" --no-owner --no-acl > backup_$(date +%Y-%m-%d_%H-%M).sql

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backup_*.sql
          retention-days: 30
