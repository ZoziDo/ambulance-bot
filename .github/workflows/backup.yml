name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *'     # Каждый день в 3:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Backup using Docker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e PGPASSWORD=$(echo $DATABASE_URL | cut -d':' -f3 | cut -d'@' -f1) \
            postgres:18 \
            pg_dump "$DATABASE_URL" > backup_$(date +%Y-%m-%d_%H-%M).sql

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backup_*.sql
          retention-days: 30
